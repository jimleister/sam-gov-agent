name: Run SAM Gov Agent

on:
  schedule:
    - cron: '15 8 * * *'  # runs daily at 4:15am EST
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY}}
        run: python script.py
